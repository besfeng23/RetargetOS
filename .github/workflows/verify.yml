name: Verify

on:
  pull_request:
  push:
    branches:
      - phase-1-foundation-scaffold

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Prisma validate
        run: pnpm prisma:validate

      - name: Prisma generate
        run: pnpm db:generate

      - name: Phase summary
        run: echo "RetargetOS Phase 1 scaffold verification complete"
